<div class="module module-hero-image">
  {% assign webp_src = include.image | replace: '.jpg', '.webp' | replace: '.jpeg', '.webp' | replace: '.png', '.webp' %}
  <picture>
    <source srcset="{{ webp_src | relative_url }}" type="image/webp">
    <img src="{{ include.image | relative_url }}" alt="{{ include.alt | default: page.title }}" class="hero-image" data-lightbox="true" data-caption="{{ include.caption | default: '' }}" loading="lazy">
  </picture>
  {% if include.caption %}
    <p class="image-caption">{{ include.caption }}</p>
  {% endif %}
</div>
