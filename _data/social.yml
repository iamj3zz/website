# Single source of truth for social platform links.
#
# Consumed by:
#   - _includes/social-icons.html      (footer + contact-page clickable icons)
#   - _includes/social-print-list.html (contact-page print/QR fallback)
#   - _includes/seo.html               (JSON-LD `sameAs` arrays — only entries
#                                        with `sameas: true`)
#
# Fields:
#   name     - Display name (icon aria-label suffix is always "- {{ site.social.name }}",
#              i.e. the J3ZZ brand, never a per-platform handle or real name —
#              see CLAUDE.md naming convention)
#   url      - The one full working URL. Drives the href, the print-page
#              plaintext (with "https://" stripped), and `sameAs` when
#              `sameas: true`. This is the ONLY place a platform URL/handle
#              should ever be edited — do not reintroduce a separate
#              "*_username" config key, that's what caused the LinkedIn bug
#              this file replaces (see git history).
#   icon     - Set to `false` to exclude from the clickable icon lists while
#              still allowing `sameas: true` (used for github: real profile,
#              included in structured data, but no rendered icon anywhere —
#              matches prior behavior, not a new design choice).
#   sameas   - Set to `true` to include in JSON-LD `sameAs`. Matches exactly
#              what was in _config.yml's old `social.links` array.
#   disabled - Set to `true` for a platform that's intentionally NOT linked
#              (currently only X/Twitter). Renders a non-clickable icon with
#              an explanatory tooltip instead of a link — see the
#              `social.disabled_note`/`social.disabled_aria_label` keys in
#              _data/translations.yml for the (bilingual) tooltip text.
#   svg      - Raw inner SVG markup (no <svg> wrapper — that's added by the
#              includes), viewBox is always "0 0 24 24".

