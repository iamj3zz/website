description: >- # this means to ignore newlines until "baseurl:"
    French new media artist creating experimental electronic music, immersive installations,
    and audiovisual performances merging art, science, and technology.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.j3zz.com" # the base hostname & protocol for your site, e.g. http://example.com
repository: iamj3zz/website
