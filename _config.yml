artwork_shipping_fr:
  ships_from: "Île de la Réunion"
  delivery_cost: "Les frais d'expédition sont calculés selon votre destination et confirmés avant tout engagement."
  delivery_time_domestic: "5 à 7 jours ouvrés"
  delivery_time_international: "Variable selon la destination — communiqué avant tout engagement."
  handling: "Chaque œuvre est soigneusement roulée, enveloppée dans du papier glassine sans acide et expédiée dans un tube protecteur rigide, entièrement suivi et assuré."
