  authenticity: "Un certificat d'authenticité signé est inclus avec chaque œuvre originale."

# Events
event_description_truncate: 300 # Character limit for event descriptions before showing expand toggle (0 = never truncate)

# Collections
collections:
  portfolio:
    output: true
    permalink: /works/:name/
    sort_by: order
  artworks:
    output: true
    permalink: /gallery/:name/
  events:
    output: false
    sort_by: date

defaults:
  - scope:
      path: ""
      type: "artworks"
    values:
      layout: artwork
      published: true

# Build settings
future: true # Allow posts/collections with future dates
plugins:
  - jekyll-feed
  - jekyll-last-modified-at
  - jekyll-seo-tag
  - jekyll-sitemap

# Include _pages directory
include:
  - _pages

# Sass settings
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  verbose: false

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

exclude:
  - docs/
  - node_modules/
  - vendor/
  - CLAUDE.md
  - README.md
  - lefthook.yml
  - .claude/
  - print-test-results/
